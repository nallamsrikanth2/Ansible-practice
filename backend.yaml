- name: configure the backend server
  hosts: backend
  become: yes
  vars_files:
    vars.yaml
  vars_prompt:
    - name: sql_root_password
      prompt: enter your password?
      private: false
  tasks:
  - name: disable the nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: absent
  
  - name: enable the nodejs
    ansible.builtin.command: dnf module enable nodejs:20 -y
  
  - name: install the nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: latest
  
  - name: create the user
    ansible.builtin.user:
      name: expense

  - name: create the app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: download the backend code
    ansible.builtin.get_url:
      url: https://expense-builds.s3.us-east-1.amazonaws.com/expense-backend-v2.zip
      dest: /tmp/backend.zip

  - name: unzip the backend code
    ansible.builtin.unarchive:
      src: /tmp/backend.zip
      dest: /app
      remote_src: yes

  - name: change the app directory and install the libraries
    ansible.builtin.command: npm install
    args:
      chdir: /app

  - name: copy the backend.service to /etc/systemd/system/backend.service
    ansible.builtin.copy:
      src: backend.service
      dest: /etc/systemd/system/backend.service

  - name: daemon_reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: start and enable backend server
    ansible.builtin.service:
      name: backend
      state: started
      enabled: yes
  
  - name: install mysql 
    ansible.builtin.dnf:
      name: mysql
      state: latest

  - name: install the python libraries
    ansible.builtin.pip:
      name:
      - pymysql
      - cryptography
      executable: pip3.9
  
  - name: load the schema
    community.mysql.mysql_db:
      login_host: "{{login_host}}"
      login_password: "{{sql_root_password}}"
      login_user: "{{login_user}}"
      name: all
      state: import
      target: /app/schema/backend.sql
  
  - name: restarted the backend server
    ansible.builtin.service:
      name: backend
      state: restarted


  

