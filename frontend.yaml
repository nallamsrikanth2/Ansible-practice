- name: configure the frontend server
  hosts: frontend
  become: yes
  tasks:
  - name: install the nginx 
    ansible.builtin.dnf:
      name: nginx
      state: latest

  - name: enable and start nginx server
    ansible.builtin.service:
      name: nginx
      state: started
      enabled: yes
  
  - name: remove the html directory
    ansible.builtin.file:
      path: rm -rf /usr/share/nginx/html
      state: absent

  - name: create the html directory
    ansible.builtin.file:
      path: /usr/share/nginx/html
      state: directory

  - name: download the frontend code
    ansible.builtin.get_url:
      url:  https://expense-builds.s3.us-east-1.amazonaws.com/expense-frontend-v2.zip
      dest: /tmp/frontend.zip

  - name: unzip the code
    ansible.builtin.unarchive:
      src: /tmp/frontend.zip
      dest: /usr/share/nginx/html
      remote_src: yes

  - name: copy the code
    ansible.builtin.copy:
      src: expense.conf
      dest: /etc/nginx/default.d/expense.conf

  - name: restart the frontend server
    ansible.builtin.service:
      name: frontend
      state: restarted
  